<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 antialiased font-sans flex flex-col min-h-screen">
    <header></header>

    <main class="flex-grow">
        <div class="max-w-4xl mx-auto p-4 space-y-6">

            <!-- Dashboard Summary -->
            <section id="dashboard" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center justify-center">
                    <h3 class="text-sm text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wide">Balance</h3>
                    <p id="totalBalance" class="text-3xl font-bold mt-1">$0.00</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center justify-center">
                    <h3 class="text-sm text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wide">Income</h3>
                    <p id="totalIncome" class="text-2xl font-semibold text-emerald-600 dark:text-emerald-400 mt-1">+$0.00</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center justify-center">
                    <h3 class="text-sm text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wide">Expenses</h3>
                    <p id="totalExpenses" class="text-2xl font-semibold text-rose-600 dark:text-rose-400 mt-1">-$0.00</p>
                </div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Expense Breakdown -->
                <section class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h2 class="text-lg font-bold mb-4 border-b dark:border-gray-700 pb-2 flex items-center gap-2">
                        <i class="ph ph-pie-chart"></i> Expense Breakdown
                    </h2>
                    <div class="relative min-h-[250px] flex items-center justify-center">
                        <canvas id="expenseChart"></canvas>
                        <div id="noExpenseData" class="absolute inset-0 flex items-center justify-center text-gray-400 hidden">
                            No expenses yet.
                        </div>
                    </div>
                </section>

                <!-- Income Breakdown -->
                <section class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h2 class="text-lg font-bold mb-4 border-b dark:border-gray-700 pb-2 flex items-center gap-2">
                        <i class="ph ph-chart-donut"></i> Income Breakdown
                    </h2>
                    <div class="relative min-h-[250px] flex items-center justify-center">
                        <canvas id="incomeChart"></canvas>
                        <div id="noIncomeData" class="absolute inset-0 flex items-center justify-center text-gray-400 hidden">
                            No income yet.
                        </div>
                    </div>
                </section>
            </div>

            <!-- Balance Trend -->
            <section class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                <h2 class="text-lg font-bold mb-4 border-b dark:border-gray-700 pb-2 flex items-center gap-2">
                    <i class="ph ph-chart-line"></i> Balance Trend (Current Month)
                </h2>
                <div class="relative min-h-[300px]">
                    <canvas id="trendChart"></canvas>
                </div>
            </section>

        </div>
    </main>

    <footer class="py-4 text-center text-sm text-gray-500 dark:text-gray-400">
        Finance Tracker &copy; <span id="currentYear"></span>. All data stored locally.
    </footer>

    <script src="shared.js"></script>
    <script src="app.js"></script>
</body>
</html>
