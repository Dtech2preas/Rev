<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 antialiased font-sans flex flex-col min-h-screen">
    <header></header>

    <main class="flex-grow">
        <div class="max-w-4xl mx-auto p-4 space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Transaction Form -->
                <section class="md:col-span-1 bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 h-fit">
                    <h2 id="formTitle" class="text-lg font-bold mb-4 border-b dark:border-gray-700 pb-2 flex items-center gap-2">
                        <i class="ph ph-plus-circle"></i> Add Transaction
                    </h2>
                    <form id="transactionForm" class="space-y-4">
                        <input type="hidden" id="transactionId">
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="expense" class="peer sr-only" checked>
                                <div class="text-center p-2 rounded border border-gray-200 dark:border-gray-700 peer-checked:bg-rose-50 dark:peer-checked:bg-rose-900/20 peer-checked:border-rose-500 peer-checked:text-rose-700 dark:peer-checked:text-rose-400 transition">
                                    Expense
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="income" class="peer sr-only">
                                <div class="text-center p-2 rounded border border-gray-200 dark:border-gray-700 peer-checked:bg-emerald-50 dark:peer-checked:bg-emerald-900/20 peer-checked:border-emerald-500 peer-checked:text-emerald-700 dark:peer-checked:text-emerald-400 transition">
                                    Income
                                </div>
                            </label>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Amount</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">$</span>
                                <input type="number" id="amount" step="0.01" min="0" required class="w-full pl-7 p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="0.00">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
                            <select id="category" required class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date</label>
                            <input type="date" id="date" required class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description (Optional)</label>
                            <input type="text" id="description" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="What was this for?">
                        </div>

                        <div class="flex gap-2">
                            <button type="submit" id="submitBtn" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded transition">
                                Add Transaction
                            </button>
                            <button type="button" id="cancelBtn" class="hidden px-4 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded transition">
                                Cancel
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Transaction List & Filters -->
                <section class="md:col-span-2 space-y-4">
                    <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 space-y-4">
                        <div class="flex flex-wrap gap-3">
                            <div class="flex-grow min-w-[200px]">
                                <input type="text" id="searchInput" placeholder="Search descriptions..." class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <select id="filterCategory" class="p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 outline-none">
                                <option value="">All Categories</option>
                            </select>
                            <input type="date" id="filterDateStart" class="p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 outline-none">
                            <input type="date" id="filterDateEnd" class="p-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 outline-none">
                        </div>

                        <div class="flex justify-between items-center pt-2 border-t dark:border-gray-700">
                            <div class="flex gap-2">
                                <button id="importBtn" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline flex items-center gap-1">
                                    <i class="ph ph-file-arrow-up"></i> Import CSV
                                </button>
                                <input type="file" id="csvFile" class="hidden" accept=".csv">
                                <button id="exportCsvBtn" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline flex items-center gap-1">
                                    <i class="ph ph-file-arrow-down"></i> Export CSV
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="text-sm text-gray-500 dark:text-gray-400 border-b dark:border-gray-700">
                                        <th class="pb-2 font-medium">Date</th>
                                        <th class="pb-2 font-medium">Description</th>
                                        <th class="pb-2 font-medium">Category</th>
                                        <th class="pb-2 font-medium text-right">Amount</th>
                                        <th class="pb-2 font-medium text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionList" class="text-sm">
                                </tbody>
                            </table>
                            <div id="emptyState" class="text-center py-8 text-gray-400 hidden">
                                <i class="ph ph-receipt text-4xl mb-2"></i>
                                <p>No transactions found.</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center text-sm text-gray-500 dark:text-gray-400">
        Finance Tracker &copy; <span id="currentYear"></span>. All data stored locally.
    </footer>

    <script src="shared.js"></script>
    <script src="transactions.js"></script>
</body>
</html>
