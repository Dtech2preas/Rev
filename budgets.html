<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets & Goals - Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 antialiased font-sans flex flex-col min-h-screen">
    <header></header>

    <main class="flex-grow">
        <div class="max-w-4xl mx-auto p-4 space-y-8">

            <!-- Budgets Section -->
            <section class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i class="ph ph-chart-bar"></i> Monthly Budgets
                    </h2>
                    <button id="addBudgetBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-sm transition flex items-center gap-1">
                        <i class="ph ph-plus"></i> Set Budget
                    </button>
                </div>
                <div id="budgetsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Budgets will be rendered here -->
                </div>
            </section>

            <!-- Savings Goals Section -->
            <section class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i class="ph ph-target"></i> Savings Goals
                    </h2>
                    <button id="addGoalBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-sm transition flex items-center gap-1">
                        <i class="ph ph-plus"></i> New Goal
                    </button>
                </div>
                <div id="goalsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Goals will be rendered here -->
                </div>
            </section>

            <!-- Recurring Transactions Section -->
            <section class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i class="ph ph-repeat"></i> Recurring Transactions
                    </h2>
                    <button id="addRecurringBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-sm transition flex items-center gap-1">
                        <i class="ph ph-plus"></i> Add Recurring
                    </button>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-sm text-gray-500 dark:text-gray-400 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
                                <th class="p-3 font-medium">Description</th>
                                <th class="p-3 font-medium">Frequency</th>
                                <th class="p-3 font-medium text-right">Amount</th>
                                <th class="p-3 font-medium text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="recurringList" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Modals (Hidden by default) -->
    <!-- Simplified for now, will be implemented in script -->

    <footer class="py-4 text-center text-sm text-gray-500 dark:text-gray-400">
        Finance Tracker &copy; <span id="currentYear"></span>. All data stored locally.
    </footer>

    <script src="shared.js"></script>
    <script src="budgets.js"></script>
</body>
</html>
